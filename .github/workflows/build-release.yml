name: Build release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Nombre de version (ej. 1.1)"
        required: false
        default: "1.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName=${{ inputs.version_name }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}-${{ github.run_number }}
          name: KompressALL ${{ inputs.version_name }} (build ${{ github.run_number }})
          files: app/build/outputs/apk/release/app-release.apk
